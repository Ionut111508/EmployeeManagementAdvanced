name: .NET Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore API
        run: dotnet restore EmployeeManagement/EmployeeManagement.csproj

      - name: Build API
        run: dotnet build EmployeeManagement/EmployeeManagement.csproj --configuration Release --no-restore

      - name: Restore tests
        run: dotnet restore EmployeeManagement.Tests/EmployeeManagement.Tests.csproj

      - name: Run tests
        run: dotnet test EmployeeManagement.Tests/EmployeeManagement.Tests.csproj --configuration Release --no-restore --verbosity normal
